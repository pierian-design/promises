<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Promise Demo</title>
  <style>
    .container { 
        display: flex; 
        flex-wrap: wrap; 
        gap: 20px; 
        padding: 20px; 
    }
    .card { 
        border: 1px solid #ccc; 
        border-radius: 8px; 
        padding: 15px; 
        width: 300px; 
    }
    button { 
        padding: 8px 16px; 
        margin: 5px; 
        cursor: pointer; 
    }
    button:disabled {
        opacity: 0.6; 
        cursor: not-allowed; 
    }
    .result { 
        margin-top: 10px; 
        font-family: monospace; 
        white-space: pre-wrap; 
        background: #f5f5f5; 
        padding: 8px; 
        border-radius: 4px; 
    }
  </style>
</head>
<body>
  <h1>Promise Features</h1>
  <div class="container" id="app"></div>

  <script src="async-button.js"></script>
  <script src="script.js"></script>
</body>
</html>
